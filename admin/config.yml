backend:
  name: git-gateway
  branch: main

media_folder: "public/assets"
public_folder: "/assets"

collections:
  - name: "posts"
    label: "Publications"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Auteur", name: "author", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Image de couverture", name: "image", widget: "image" }
      - { label: "Contenu", name: "body", widget: "markdown" }

  - name: "members"
    label: "Membres"
    folder: "content/members"
    create: true
    slug: "{{name}}"
    fields:
      - { label: "Nom", name: "name", widget: "string" }
      - { label: "Rôle", name: "role", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image" }
      - { label: "Ordre d'affichage", name: "order", widget: "number" }

  - name: "events"
    label: "Événements"
    folder: "content/events"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Lieu", name: "location", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }

  - name: "actualites"
    label: "Actualités"
    folder: "content/actualites"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Source", name: "source", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", dateFormat: "YYYY-MM-DD", timeFormat: false}
      - {label: "Résumé", name: "summary", widget: "text"}
